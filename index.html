<!DOCTYPE html>
<html>
<body>

<h2>Order Form</h2>

<input id="name" placeholder="Name"><br><br>
<input id="address" placeholder="Address"><br><br>
<input id="product" placeholder="Product"><br><br>
<input id="qty" placeholder="Quantity"><br><br>

<button onclick="send()">Submit</button>

<p id="msg"></p>

<script>
function send() {
  fetch("http://localhost:5000/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      customerName: document.getElementById("name").value,
      address: document.getElementById("address").value,
      productName: document.getElementById("product").value,
      quantity: document.getElementById("qty").value,
      totalPrice: 100
    })
  });

  document.getElementById("msg").innerText = "Order ho gaya ✅";
}
</script>

</body>
</html>
