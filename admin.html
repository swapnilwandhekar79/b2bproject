<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>👑 Admin Panel</h2>

<div class="box">
  <h3>👤 All Users</h3>
  <ul id="users"></ul>
</div>

<div class="box">
  <h3>📦 All Orders</h3>
  <ul id="orders"></ul>
</div>

<div class="box">
  <h3>💰 Total Revenue</h3>
  <p id="revenue">₹0</p>
</div>

<script>

// LOAD USERS
async function loadUsers() {
  const res = await fetch("http://localhost:5000/all-users");
  const data = await res.json();

  let html = "";
  data.forEach(u => {
    html += `<li>${u.username}</li>`;
  });

  users.innerHTML = html;
}

// LOAD ORDERS
async function loadOrders() {
  const res = await fetch("http://localhost:5000/all-orders");
  const data = await res.json();

  let html = "";
  let total = 0;

  data.forEach(o => {
    html += `<li>${o.customerName} - ${o.productName} (₹${o.totalPrice})</li>`;
    total += o.totalPrice;
  });

  orders.innerHTML = html;
  revenue.innerText = total;
}

// INIT
loadUsers();
loadOrders();

</script>

</body>
</html>
