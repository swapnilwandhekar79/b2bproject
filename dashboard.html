<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input, select {
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    canvas {
      max-width: 400px;
      margin: 20px;
    }
  </style>
</head>

<body>

<h1>🛍️ Cloth Shop Dashboard</h1>

<div class="card">
  <h3>Create Order</h3>

  <select id="product">
    <option>Shirt</option>
    <option>Pant</option>
    <option>Saree</option>
    <option>Kurti</option>
  </select>

  <input id="qty" placeholder="Quantity">
  <input id="price" placeholder="Price">

  <button onclick="createOrder()">Add Order</button>
</div>

<div class="card">
  <h3>Analytics</h3>

  <canvas id="salesChart"></canvas>
  <canvas id="productChart"></canvas>
</div>

<script>
const API = "https://b2b-backend-6nze.onrender.com";

async function createOrder() {
  const order = {
    user: localStorage.getItem("user"),
    product: document.getElementById("product").value,
    qty: Number(document.getElementById("qty").value),
    price: Number(document.getElementById("price").value),
    date: new Date().toLocaleDateString()
  };

  await fetch(API + "/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(order)
  });

  alert("Order Saved ✅");
  loadData();
}

async function loadData() {
  const user = localStorage.getItem("user");

  const res = await fetch(API + "/orders/" + user);
  const data = await res.json();

  let totalSales = 0;
  let productMap = {};

  data.forEach(o => {
    totalSales += o.price * o.qty;

    if (!productMap[o.product]) {
      productMap[o.product] = 0;
    }
    productMap[o.product] += o.qty;
  });

  // SALES CHART
  new Chart(document.getElementById("salesChart"), {
    type: "bar",
    data: {
      labels: ["Total Sales"],
      datasets: [{
        label: "₹",
        data: [totalSales]
      }]
    }
  });

  // PRODUCT CHART
  new Chart(document.getElementById("productChart"), {
    type: "pie",
    data: {
      labels: Object.keys(productMap),
      datasets: [{
        data: Object.values(productMap)
      }]
    }
  });
}

loadData();
</script>

</body>
</html>
