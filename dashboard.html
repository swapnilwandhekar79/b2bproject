<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#667eea; color:white; padding:15px; text-align:center; }
    .container { padding:20px; }
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
    input { padding:10px; margin:5px; width:90%; }
    button { padding:10px; width:100%; background:#667eea; color:white; border:none; }
  </style>
</head>

<body>

<header>📊 Welcome <span id="user"></span></header>

<div class="container">

<div class="card">
<h3>Create Order</h3>
<input id="product" placeholder="Product">
<input id="qty" placeholder="Quantity">
<input id="price" placeholder="Price">
<button onclick="create()">Save Order</button>
<p id="msg"></p>
</div>

<div class="card">
<h3>Analytics</h3>
<p>Total Orders: <span id="totalOrders">0</span></p>
<p>Total Revenue: ₹<span id="revenue">0</span></p>
</div>

<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

const API = "https://b2b-backend-6nze.onrender.com";

user.innerText = localStorage.getItem("user");

// SAVE ORDER
function create(){
  const data = {
    user: localStorage.getItem("user"),
    product: product.value,
    quantity: Number(qty.value),
    total: qty.value * price.value,
    date: new Date().toLocaleDateString()
  };

  fetch(API+"/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(d=>{
    msg.innerText=d.message;
    loadData();
  });
}

// LOAD ANALYTICS
async function loadData(){
  let res = await fetch(API+"/orders/"+localStorage.getItem("user"));
  let data = await res.json();

  totalOrders.innerText = data.length;

  let total = 0;
  let productStats = {};

  data.forEach(o=>{
    total += o.total;

    productStats[o.product] =
      (productStats[o.product] || 0) + o.quantity;
  });

  revenue.innerText = total;

  // BAR CHART
  new Chart(barChart,{
    type:"bar",
    data:{
      labels:Object.keys(productStats),
      datasets:[{data:Object.values(productStats)}]
    }
  });

  // PIE CHART
  new Chart(pieChart,{
    type:"pie",
    data:{
      labels:Object.keys(productStats),
      datasets:[{data:Object.values(productStats)}]
    }
  });
}

loadData();

</script>

</body>
</html>
