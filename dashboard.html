<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 95%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .alert {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
📊 Dashboard - <span id="user"></span>
</header>

<div class="container">

<!-- CREATE ORDER -->
<div class="card">
<h3>Create Order</h3>

<input id="product" placeholder="Product Name">
<input id="qty" placeholder="Quantity">
<input id="price" placeholder="Price">

<button onclick="create()">Save Order</button>

<p id="msg"></p>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>Business Analytics</h3>

<p>Total Orders: <span id="totalOrders">0</span></p>
<p>Total Revenue: ₹<span id="revenue">0</span></p>
<p>Top Product: <span id="topProduct">-</span></p>

<p class="alert" id="lowStock"></p>
</div>

<!-- MONTHLY CHART -->
<div class="card">
<h3>Monthly Revenue</h3>
<canvas id="monthChart"></canvas>
</div>

</div>

<script>

const API = "https://b2b-backend-6nze.onrender.com";

// USER NAME SHOW
document.getElementById("user").innerText = localStorage.getItem("user");

// CREATE ORDER
function create(){
  const data = {
    user: localStorage.getItem("user"),
    product: document.getElementById("product").value,
    quantity: Number(document.getElementById("qty").value),
    total: document.getElementById("qty").value * document.getElementById("price").value,
    date: new Date().toLocaleDateString()
  };

  fetch(API+"/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(d=>{
    document.getElementById("msg").innerText = d.message;
    loadData();
  });
}

// LOAD DATA
async function loadData(){
  let res = await fetch(API+"/orders/"+localStorage.getItem("user"));
  let data = await res.json();

  document.getElementById("totalOrders").innerText = data.length;

  let total = 0;
  let productStats = {};
  let monthStats = {};

  data.forEach(o=>{
    total += o.total;

    // PRODUCT COUNT
    productStats[o.product] =
      (productStats[o.product] || 0) + o.quantity;

    // MONTH DATA
    let month = o.date.split("/")[1];
    monthStats[month] =
      (monthStats[month] || 0) + o.total;
  });

  document.getElementById("revenue").innerText = total;

  // TOP PRODUCT
  let top = "-";
  if(Object.keys(productStats).length > 0){
    top = Object.keys(productStats).reduce((a,b)=>
      productStats[a] > productStats[b] ? a : b
    );
  }

  document.getElementById("topProduct").innerText = top;

  // LOW STOCK ALERT
  let low = Object.keys(productStats).filter(p => productStats[p] < 5);

  if(low.length > 0){
    document.getElementById("lowStock").innerText =
      "⚠ Low stock: " + low.join(", ");
  } else {
    document.getElementById("lowStock").innerText = "";
  }

  // CHART
  new Chart(document.getElementById("monthChart"),{
    type:"bar",
    data:{
      labels:Object.keys(monthStats),
      datasets:[{
        label:"Revenue",
        data:Object.values(monthStats)
      }]
    }
  });
}

// INITIAL LOAD
loadData();

</script>

</body>
</html>
