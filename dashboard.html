<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; }
    h1 { text-align:center; }

    .card {
      background:white;
      padding:20px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
    }

    input, select {
      padding:10px;
      margin:5px;
      width:200px;
    }

    button {
      padding:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    canvas {
      max-width:400px;
      margin:20px;
    }
  </style>
</head>

<body>

<h1>🛍️ Cloth Shop Dashboard</h1>

<div class="card">
<h3>🧾 Create Bill</h3>

<input id="customer" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile Number"><br>

<select id="product">
  <option>Shirt</option>
  <option>Pant</option>
  <option>Saree</option>
  <option>Kurti</option>
</select><br>

<input id="qty" placeholder="Quantity">
<input id="price" placeholder="Price"><br>

<button onclick="createOrder()">Generate Bill</button>
</div>

<div class="card">
<h3>📊 Analytics</h3>
<canvas id="salesChart"></canvas>
<canvas id="productChart"></canvas>
</div>

<script>

const API = "https://b2b-backend-6nze.onrender.com";

// CREATE ORDER + BILL
async function createOrder() {
  const order = {
    user: localStorage.getItem("user"),
    customer: document.getElementById("customer").value,
    mobile: document.getElementById("mobile").value,
    product: document.getElementById("product").value,
    qty: Number(document.getElementById("qty").value),
    price: Number(document.getElementById("price").value),
    total: document.getElementById("qty").value * document.getElementById("price").value,
    date: new Date().toLocaleDateString()
  };

  await fetch(API+"/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(order)
  });

  generateBill(order);
  loadData();
}

// BILL PRINT
function generateBill(order){
  const win = window.open("","","width=400,height=600");

  win.document.write(`
    <h2>🛍️ Cloth Shop Bill</h2>
    <hr>
    <p><b>Customer:</b> ${order.customer}</p>
    <p><b>Mobile:</b> ${order.mobile}</p>
    <p><b>Product:</b> ${order.product}</p>
    <p><b>Qty:</b> ${order.qty}</p>
    <p><b>Price:</b> ₹${order.price}</p>
    <hr>
    <h3>Total: ₹${order.total}</h3>
    <p>Date: ${order.date}</p>
    <hr>
    <p>Thank You 🙏</p>
  `);

  win.print();
}

// LOAD DATA
async function loadData(){
  const res = await fetch(API+"/orders/"+localStorage.getItem("user"));
  const data = await res.json();

  let totalSales = 0;
  let productMap = {};

  data.forEach(o=>{
    totalSales += o.total;

    if(!productMap[o.product]){
      productMap[o.product] = 0;
    }
    productMap[o.product] += o.qty;
  });

  new Chart(document.getElementById("salesChart"),{
    type:"bar",
    data:{
      labels:["Total Sales"],
      datasets:[{data:[totalSales]}]
    }
  });

  new Chart(document.getElementById("productChart"),{
    type:"pie",
    data:{
      labels:Object.keys(productMap),
      datasets:[{data:Object.values(productMap)}]
    }
  });
}

loadData();

</script>

</body>
</html>
