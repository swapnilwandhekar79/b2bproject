<!DOCTYPE html>
<html>
<head>
<title>Pro Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;background:#f4f6f9;padding:20px;}
.card {background:white;padding:20px;margin:10px;border-radius:10px;}
input,select {padding:10px;margin:5px;}
button {padding:10px;background:black;color:white;border:none;}
.alert {color:red;font-weight:bold;}
</style>
</head>

<body>

<h1>🛍️ Shop Dashboard (Pro)</h1>

<!-- BILL -->
<div class="card">
<h3>Create Bill</h3>

<input id="customer" placeholder="Customer">
<input id="mobile" placeholder="Mobile"><br>

<select id="product">
<option>Shirt</option>
<option>Pant</option>
<option>Saree</option>
<option>Kurti</option>
</select>

<input id="qty" placeholder="Qty">
<input id="price" placeholder="Price">

<button onclick="createOrder()">Generate Bill</button>
</div>

<!-- INVENTORY -->
<div class="card">
<h3>📦 Inventory</h3>
<p id="inventory"></p>
<p class="alert" id="lowStock"></p>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>📊 Analytics</h3>

<p>Total Sales: ₹<span id="sales">0</span></p>
<p>Top Product: <span id="topProduct">-</span></p>
<p>Top Customer: <span id="topCustomer">-</span></p>

<canvas id="chart"></canvas>
</div>

<script>

const API = "https://b2b-backend-6nze.onrender.com";

// CREATE ORDER
async function createOrder(){

let order = {
user: localStorage.getItem("user"),
customer: document.getElementById("customer").value,
mobile: document.getElementById("mobile").value,
product: document.getElementById("product").value,
qty: Number(document.getElementById("qty").value),
price: Number(document.getElementById("price").value),
total: document.getElementById("qty").value * document.getElementById("price").value,
date: new Date().toLocaleDateString()
};

await fetch(API+"/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(order)
});

generateBill(order);
loadData();
}

// BILL PRINT
function generateBill(o){
let w = window.open("");
w.document.write(`
<h2>Shop Bill</h2>
<p>${o.customer}</p>
<p>${o.product} x ${o.qty}</p>
<h3>Total ₹${o.total}</h3>
`);
w.print();
}

// LOAD DATA
async function loadData(){

let res = await fetch(API+"/orders/"+localStorage.getItem("user"));
let data = await res.json();

let total = 0;
let productMap = {};
let customerMap = {};
let inventory = {
Shirt:50,
Pant:40,
Saree:30,
Kurti:20
};

// PROCESS DATA
data.forEach(o=>{
total += o.total;

// product count
productMap[o.product] = (productMap[o.product]||0)+o.qty;

// customer spend
customerMap[o.customer] = (customerMap[o.customer]||0)+o.total;

// reduce inventory
inventory[o.product] -= o.qty;
});

// UPDATE UI
document.getElementById("sales").innerText = total;

// TOP PRODUCT
let topP = Object.keys(productMap).reduce((a,b)=>productMap[a]>productMap[b]?a:b,"-");
document.getElementById("topProduct").innerText = topP;

// TOP CUSTOMER
let topC = Object.keys(customerMap).reduce((a,b)=>customerMap[a]>customerMap[b]?a:b,"-");
document.getElementById("topCustomer").innerText = topC;

// INVENTORY SHOW
let invText="";
let low=[];

for(let p in inventory){
invText += `${p}: ${inventory[p]}<br>`;
if(inventory[p] < 5) low.push(p);
}

document.getElementById("inventory").innerHTML = invText;

// LOW STOCK
if(low.length){
document.getElementById("lowStock").innerText = "Low stock: "+low.join(",");
}

// CHART
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:Object.keys(productMap),
datasets:[{data:Object.values(productMap)}]
}
});
}

loadData();

</script>

</body>
</html>
